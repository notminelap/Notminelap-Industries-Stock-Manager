services:
  - type: web
    name: notminelap-industries
    env: node
    region: singapore   # closest to India
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false       # you enter this manually in Render dashboard
